name: dart_pty
description: "Production-grade pseudo-terminal (PTY) for Flutter desktop via FFI. Supports macOS (posix_spawn), Linux (fork/exec), and Windows (ConPTY)."
version: 0.0.1
homepage: https://github.com/cdrury526/dart_pty

environment:
  sdk: ^3.10.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

dev_dependencies:
  ffigen: ^13.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
